<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>手機租借預約</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <style>
    body {
      font-family: "Helvetica Neue", sans-serif;
      background: #f9f9f9;
      padding: 24px;
      max-width: 600px;
      margin: auto;
    }
    h1 {
      font-size: 24px;
      text-align: center;
      margin-bottom: 24px;
    }
    label {
      font-weight: bold;
      margin-top: 20px;
      display: block;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 4px;
      margin-bottom: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .form-checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0 20px 0;
    }
    .form-checkbox label {
      display: inline;
      margin: 0;
    }
    .form-checkbox input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin: 0;
    }
    button {
      background: #000;
      color: #fff;
      font-size: 16px;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #summary {
      background: #eef;
      padding: 12px;
      border-radius: 6px;
      margin-top: -8px;
      margin-bottom: 12px;
      font-size: 16px;
    }
    #summary strong {
      font-weight: 700;
    }
  </style>
</head>
<body>
  <h1>手機租借預約</h1>

  <form id="rental-form">
    <label for="name">姓名</label>
    <input type="text" id="name" name="name" required />

    <label for="phone">聯絡電話</label>
    <input type="tel" id="phone" name="phone" required />

    <label for="daterange">租借日期區間</label>
    <input type="text" id="daterange" name="daterange" required placeholder="請選擇日期區間" />

    <div id="summary" style="display: none;">
      📦 領取日：<strong id="pickup-date"></strong><br>
      📦 還機日：<strong id="return-date"></strong><br>
      ⏰ 租借天數：<strong id="rental-days"></strong>
    </div>

    <label for="model">租借設備</label>
    <select id="model" name="model">
      <option>S23 Ultra 黑</option>
    </select>

    <div class="form-checkbox">
      <input type="checkbox" id="charger" name="charger" />
      <label for="charger">需要 Type-C 充電頭</label>
    </div>

    <label for="contact">IG 或 LINE ID</label>
    <input type="text" id="contact" name="contact" required />

    <label for="pickup">預計取機地點</label>
    <select id="pickup" name="pickup" required>
      <option>弘大</option>
      <option>新村</option>
      <option>合井</option>
      <option>望遠</option>
      <option>永登浦周邊</option>
    </select>

    <label for="note">備註</label>
    <textarea id="note" name="note"></textarea>

    <div class="form-checkbox">
      <input type="checkbox" id="agree" name="agree" required />
      <label for="agree">我已閱讀並同意租借規則</label>
    </div>

    <button type="submit">送出預約</button>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script>
    function getWeekday(date) {
      return ['日', '一', '二', '三', '四', '五', '六'][date.getDay()];
    }

    async function fetchReservedDates() {
      const res = await fetch("https://script.google.com/macros/s/AKfycbxNBeTng-gU9frn-zMDXJUVfnytCalCSk1W7xLZXzJ63dmtH6A2gN7b9m1HrinPrd1q/exec");
      const data = await res.json();

      const disabled = [];
      data.forEach(range => {
        const start = new Date(range.start);
        const end = new Date(range.end);
        while (start <= end) {
          disabled.push(start.toISOString().split("T")[0]);
          start.setDate(start.getDate() + 1);
        }
      });

      const fp = flatpickr("#daterange", {
        mode: "range",
        minDate: "today",
        dateFormat: "Y-m-d",
        disable: disabled,
        onChange: function(selectedDates) {
          if (selectedDates.length === 2) {
            const [start, end] = selectedDates;
            const days = Math.round((end - start) / (1000 * 60 * 60 * 24)) + 1;
            document.getElementById("summary").style.display = "block";
            document.getElementById("pickup-date").textContent = `${start.getFullYear()}/${start.getMonth() + 1}/${start.getDate()}（${getWeekday(start)}）`;
            document.getElementById("return-date").textContent = `${end.getFullYear()}/${end.getMonth() + 1}/${end.getDate()}（${getWeekday(end)}）`;
            document.getElementById("rental-days").textContent = `${days} 天`;
          } else {
            document.getElementById("summary").style.display = "none";
          }
        }
      });

      document.getElementById("rental-form").addEventListener("submit", async function(e) {
        e.preventDefault();
        const form = e.target;
        const [start, end] = document.getElementById("daterange")._flatpickr.selectedDates;

        // ✅ 強化防呆驗證
        if (!start || !end) {
          alert("請選擇完整的租借日期區間！");
          return;
        }

        if (!form.agree.checked) {
          alert("請先勾選同意租借規則！");
          return;
        }

        const days = Math.round((end - start) / (1000 * 60 * 60 * 24)) + 1;

        const payload = {
          name: form.name.value,
          phone: form.phone.value,
          startDate: start.toISOString().split("T")[0],
          endDate: end.toISOString().split("T")[0],
          days: `${days} 天`,
          model: form.model.value,
          charger: form.charger.checked ? "需要" : "不需要",
          contact: form.contact.value,
          pickup: form.pickup.value,
          note: form.note.value,
          timestamp: new Date().toISOString(),
        };

        const res = await fetch("https://script.google.com/macros/s/AKfycbyY875RTzxvTSWxUiXHtq_KJLtePhgnRfVfXsUNW9c/dev", {
          method: "POST",
          body: JSON.stringify(payload),
        });

        const result = await res.json();
        if (result.status === "success") {
          alert("✅ 預約成功！");
          form.reset();
          fp.clear();
          document.getElementById("summary").style.display = "none";
        } else {
          alert("❌ 預約失敗：" + (result.message || "請稍後再試"));
        }
      });
    }

    fetchReservedDates();
  </script>
</body>
</html>

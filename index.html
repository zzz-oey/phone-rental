<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>手機租借預約</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 2rem;
      max-width: 600px;
      margin: auto;
    }

    h2 {
      text-align: center;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    label {
      font-weight: bold;
      margin-bottom: 0.3rem;
    }

    input, select, textarea {
      padding: 0.5rem;
      font-size: 1rem;
      width: 100%;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .checkbox-group label {
      font-weight: normal;
    }

    .summary {
      background: #f9f9f9;
      border-left: 4px solid #aaa;
      padding: 0.75rem;
      margin-top: 1rem;
      font-size: 0.95rem;
    }

    button {
      background-color: black;
      color: white;
      padding: 0.75rem;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }

    button:hover {
      background-color: #333;
    }
  </style>
</head>
<body>

<h2>📱 手機租借預約表單</h2>

<form id="bookingForm">
  <label for="name">IG帳號 或 LINE ID</label>
  <input type="text" id="name" name="name" placeholder="@your_ig 或 line_id" required>

  <label for="range">租借日期區間（含領取日與還機日）</label>
  <input type="text" id="range" name="range" required>

  <label for="location">預計取機地點</label>
  <select id="location" name="location" required>
    <option value="弘大">弘大</option>
    <option value="龍山">龍山</option>
    <option value="明洞">明洞</option>
  </select>

  <div class="checkbox-group">
    <input type="checkbox" id="needCharger" name="needCharger">
    <label for="needCharger">是否需要 Type-C 充電頭</label>
  </div>

  <label for="note">備註</label>
  <textarea id="note" name="note" rows="3" placeholder="如有特殊需求請備註"></textarea>

  <div class="checkbox-group">
    <input type="checkbox" id="agree" required>
    <label for="agree">我已閱讀並同意租借規則</label>
  </div>

  <div class="summary" id="summaryText">📆 尚未選擇日期</div>

  <button type="submit">送出預約</button>
</form>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
  const disabledDates = []; // 未來可串接後端拉資料填入
  const fp = flatpickr("#range", {
    mode: "range",
    minDate: "today",
    dateFormat: "Y-m-d",
    disable: disabledDates,
    onChange: function(selectedDates) {
      const summary = document.getElementById('summaryText');
      if (selectedDates.length === 2) {
        const start = selectedDates[0].toLocaleDateString();
        const end = selectedDates[1].toLocaleDateString();
        summary.textContent = `📦 預計領取：${start}，歸還：${end}`;
      } else {
        summary.textContent = "📆 尚未選擇完整區間";
      }
    }
  });

  const form = document.getElementById("bookingForm");
  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const formData = {
      name: form.name.value,
      range: form.range.value,
      location: form.location.value,
      needCharger: form.needCharger.checked ? "需要" : "不需要",
      note: form.note.value
    };

    fetch("https://script.google.com/macros/s/AKfycbzG5uBclXUVjO2QeBw-tWchrd34fJIzNrnd8IdvcQSayuVOCXnzkbe6edfH_DRAAxBl/exec", {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(formData)
    });

    alert("已送出預約！我們會盡快與您聯繫！");
    form.reset();
    document.getElementById("summaryText").textContent = "📆 尚未選擇日期";
    fp.clear();
  });
</script>

</body>
</html>

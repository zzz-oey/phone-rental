<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>手機租借預約表單</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"/>
  <style>
    body {
      font-family: "Helvetica Neue", sans-serif;
      background: #fff;
      color: #111;
      padding: 40px;
      max-width: 600px;
      margin: auto;
    }

    label {
      font-weight: bold;
      margin-top: 20px;
      display: block;
    }

    input[type="text"],
    textarea,
    select {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 1rem;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .checkbox-container {
      display: flex;
      align-items: center;
      margin-top: 20px;
      margin-bottom: 10px;
    }

    .checkbox-container input {
      margin-right: 10px;
      transform: scale(1.3);
    }

    .section-title {
      font-size: 1.5rem;
      margin: 30px 0 10px;
      color: #333;
    }

    .date-picker {
      margin-top: 10px;
    }

    button {
      margin-top: 30px;
      background-color: #222;
      color: #fff;
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background-color: #444;
    }
  </style>
</head>
<body>
  <h1>手機租借預約表單</h1>

  <label for="rental-date">預約租借日期</label>
  <input type="text" id="rental-date" name="rental-date" class="date-picker" placeholder="請選擇日期" />

  <div class="checkbox-container">
    <input type="checkbox" id="need-typec" name="need-typec" />
    <label for="need-typec">是否需要 Type-C 充電頭</label>
  </div>

  <label for="contact">IG帳號 或 LINE ID</label>
  <input type="text" id="contact" name="contact" placeholder="@your_ig 或 line_id" />

  <label for="location">預計取機地點</label>
  <select id="location" name="location">
    <option value="弘大">弘大</option>
    <option value="明洞">明洞</option>
    <option value="其他">其他</option>
  </select>

  <label for="note">備註</label>
  <textarea id="note" name="note" placeholder="如有特殊需求請備註"></textarea>

  <div class="checkbox-container">
    <input type="checkbox" id="agree" name="agree" />
    <label for="agree">我已閱讀並同意租借規則</label>
  </div>

  <button type="submit">送出預約</button>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script>
    flatpickr("#rental-date", {
      minDate: "today",
      dateFormat: "Y-m-d",
    });
  </script>
</body>
</html>

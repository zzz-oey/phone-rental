<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>手機租借預約</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <style>
    body {
      font-family: "Helvetica Neue", sans-serif;
      background: #f9f9f9;
      padding: 24px;
      max-width: 600px;
      margin: auto;
    }
    h1 {
      font-size: 24px;
      text-align: center;
      margin-bottom: 24px;
    }
    label {
      font-weight: bold;
      margin-top: 20px;
      display: block;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 4px;
      margin-bottom: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 12px;
      background-color: #4CAF50;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>
  <h1>手機租借預約</h1>
  <form action="thanks.html" method="POST" onsubmit="return handleSubmit()">
    <label for="name">姓名</label>
    <input type="text" id="name" name="name" required>

    <label for="phone">聯絡電話</label>
    <input type="tel" id="phone" name="phone" required>

    <label for="dates">租借日期區間</label>
    <input type="text" id="dates" name="dates" placeholder="請選擇日期期間" required>

    <label for="device">租借機型</label>
    <select id="device" name="device" required>
      <option value="S23 Ultra 黑">S23 Ultra 黑</option>
      <option value="S23 Ultra 紫">S23 Ultra 紫</option>
    </select>

    <label>
      <input type="checkbox" name="charger"> 需要 Type-C 充電頭
    </label>

    <label for="contact">IG 或 LINE ID</label>
    <input type="text" id="contact" name="contact">

    <label for="pickup">預計取機地點</label>
    <select id="pickup" name="pickup" required>
      <option value="弘大">弘大</option>
      <option value="明洞">明洞</option>
    </select>

    <label for="notes">備註</label>
    <textarea id="notes" name="notes" rows="4" placeholder="有無其他需求或說明"></textarea>

    <button type="submit">送出預約</button>
  <form onsubmit="return handleSubmit()">

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script>
    flatpickr("#dates", {
      mode: "range",
      dateFormat: "Y-m-d"
    });

    function handleSubmit() {
      window.location.href = "thanks.html";
      return false;
    }
  </script>
</body>
</html>

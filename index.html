<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>手機租借預約</title>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <style>
    body {
      font-family: "Helvetica Neue", sans-serif;
      background: #f9f9f9;
      padding: 2rem;
    }
    label {
      font-weight: bold;
      display: block;
      margin-top: 1.5rem;
    }
    input, select, textarea {
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      margin-top: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
    #rental-info {
      background-color: #eef;
      padding: 12px;
      border-radius: 6px;
      margin-top: 0.75rem;
      display: none;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <form>
    <!-- 日期區間 -->
    <label for="daterange">租借日期區間</label>
    <input type="text" id="daterange" required placeholder="請選擇日期區間" />
    <div id="rental-info"></div>

    <!-- 其他欄位可自由插入 -->
  </form>

  <script>
    function getWeekdayName(date) {
      return date.toLocaleDateString('zh-TW', { weekday: 'short' });
    }

    flatpickr("#daterange", {
      mode: "range",
      minDate: "today",
      dateFormat: "Y-m-d",
      onChange: function(selectedDates) {
        const rentalInfo = document.getElementById("rental-info");
        if (selectedDates.length === 2) {
          const start = selectedDates[0];
          const end = selectedDates[1];

          const startDateStr = `${start.getFullYear()}/${start.getMonth()+1}/${start.getDate()}（${getWeekdayName(start)}）`;
          const endDateStr = `${end.getFullYear()}/${end.getMonth()+1}/${end.getDate()}（${getWeekdayName(end)}）`;
          const diffDays = Math.round((end - start) / (1000 * 60 * 60 * 24)) + 1;

          rentalInfo.innerHTML = `
            📦 領取日：<strong>${startDateStr}</strong><br>
            📦 還機日：<strong>${endDateStr}</strong><br>
            ⏰ 租借天數：<strong>${diffDays} 天</strong>
          `;
          rentalInfo.style.display = "block";
        } else {
          rentalInfo.style.display = "none";
        }
      }
    });
  </script>
</body>
</html>

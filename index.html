<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>手機租借預約</title>
  <link href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" rel="stylesheet" />
  <style>
    body {
      font-family: sans-serif;
      padding: 2rem;
      background-color: #f9f9f9;
      color: #333;
    }
    h1 {
      text-align: center;
      margin-bottom: 2rem;
    }
    form {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin-top: 1.5rem;
      font-weight: bold;
    }
    input[type="text"],
    input[type="date"],
    input[type="tel"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 0.6rem;
      margin-top: 0.3rem;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 1rem;
    }
    .checkbox-group {
      margin-top: 1rem;
    }
    .checkbox-group label {
      font-weight: normal;
      display: flex;
      align-items: center;
      margin-top: 0.5rem;
    }
    .checkbox-group input[type="checkbox"] {
      margin-right: 0.5rem;
    }
    button {
      margin-top: 2rem;
      width: 100%;
      padding: 0.75rem;
      font-size: 1.1rem;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <h1>手機租借預約表單</h1>
  <form>
    <label for="rental-dates">租借日期區間</label>
    <input id="rental-dates" name="rental-dates" type="text" placeholder="選擇租借起始日與結束日" />

    <label for="pickup-location">取機地點</label>
    <input id="pickup-location" name="pickup-location" type="text" placeholder="如：弘大站1號出口" />

    <label for="contact-info">聯絡方式（IG 或 LINE）</label>
    <input id="contact-info" name="contact-info" type="text" placeholder="@yourID / LINE ID" />

    <label for="note">備註</label>
    <textarea id="note" name="note" rows="3" placeholder="例如：想要晚上領機、想要有手機殼等…"></textarea>

    <div class="checkbox-group">
      <label><input type="checkbox" name="accessories" value="type-c" /> 需要 Type-C 充電線</label>
      <label><input type="checkbox" name="accessories" value="cable" /> 需要掛繩</label>
      <label><input type="checkbox" name="accessories" value="case" /> 需要手機殼</label>
    </div>

    <div class="checkbox-group">
      <label><input type="checkbox" name="agree" required /> 我已詳閱並同意租借須知</label>
    </div>

    <button type="submit">送出預約</button>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script>
    flatpickr("#rental-dates", {
      mode: "range",
      dateFormat: "Y-m-d",
      minDate: "today",
      locale: "zh"
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>手機租借預約表單</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    body {
      font-family: "Helvetica Neue", sans-serif;
      padding: 30px;
      background-color: #fff;
      max-width: 600px;
      margin: auto;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      text-align: center;
    }
    label {
      font-weight: bold;
      margin-top: 20px;
      margin-bottom: 6px;
      display: block;
    }
    input[type="text"],
    input[type="tel"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      margin: 16px 0;
    }
    .checkbox-group input[type="checkbox"] {
      margin-right: 10px;
      transform: scale(1.2);
    }
    .checkbox-group label {
      margin: 0;
      font-weight: bold;
    }
    button {
      background-color: #222;
      color: #fff;
      padding: 12px;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      width: 100%;
      cursor: pointer;
      margin-top: 20px;
    }
    button:hover {
      background-color: #444;
    }
  </style>
</head>
<body>
  <h1>手機租借預約表單</h1>

  <form>
    <label for="name">姓名</label>
    <input type="text" id="name" name="name" required />

    <label for="phone">聯絡電話</label>
    <input type="tel" id="phone" name="phone" required />

    <label for="dateRange">租借日期（起始日 ~ 結束日）</label>
    <input type="text" id="dateRange" name="dateRange" required placeholder="請選擇日期區間" />

    <label for="model">租借設備</label>
    <select id="model" name="model">
      <option>S23 Ultra 墨竹綠</option>
    </select>

    <div class="checkbox-group">
      <input type="checkbox" id="charger" name="charger" />
      <label for="charger">是否需要 Type-C 充電頭</label>
    </div>

    <label for="contact">IG帳號 或 LINE ID</label>
    <input type="text" id="contact" name="contact" placeholder="@your_ig 或 line_id" required />

    <label for="pickup">預計取機地點</label>
    <select id="pickup" name="pickup" required>
      <option>弘大</option>
      <option>新村</option>
      <option>合井</option>
      <option>望遠</option>
      <option>永登浦周邊</option>
    </select>

    <label for="note">備註</label>
    <textarea id="note" name="note" placeholder="如有特殊需求請備註"></textarea>

    <div class="checkbox-group">
      <input type="checkbox" id="agree" name="agree" required />
      <label for="agree">我已閱讀並同意租借規則</label>
    </div>

    <button type="submit">送出預約</button>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script>
    flatpickr("#dateRange", {
      mode: "range",
      dateFormat: "Y-m-d",
      minDate: "today",
      disable: [
        // 這裡可以放不可租借日期（未來串接 Google Sheets 抓已租日）
        "2025-08-18", "2025-08-19", "2025-08-25"
      ],
      locale: {
        firstDayOfWeek: 1
      }
    });
  </script>
</body>
</html>

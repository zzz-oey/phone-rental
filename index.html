<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>手機租借預約</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <style>
    body {
      font-family: "Helvetica Neue", sans-serif;
      background: #f9f9f9;
      padding: 24px;
      max-width: 600px;
      margin: auto;
    }
    h1 {
      font-size: 24px;
      text-align: center;
      margin-bottom: 24px;
    }
    label {
      font-weight: bold;
      margin-top: 20px;
      display: block;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 4px;
      margin-bottom: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0 12px 0;
    }
    .checkbox-group input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin: 0;
    }
    .checkbox-group label {
      margin: 0;
      font-weight: normal;
      flex: 1;
    }
    #summary {
      background: #eef;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 12px;
      display: none;
    }
    button {
      background: #000;
      color: #fff;
      font-size: 16px;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>手機租借預約</h1>

  <form id="rental-form">
    <label for="name">姓名</label>
    <input type="text" id="name" required />

    <label for="phone">聯絡電話</label>
    <input type="tel" id="phone" required />

    <label for="daterange">租借日期區間</label>
    <input type="text" id="daterange" required placeholder="請選擇日期區間" />
    <div id="summary"></div>

    <label for="days">租借天數</label>
    <select id="days" required>
      <option value="">請選擇</option>
      <option value="1">1 天</option>
      <option value="2">2 天</option>
      <option value="3">3 天</option>
      <option value="4">4 天</option>
      <option value="5">5 天以上</option>
    </select>

    <label for="model">租借設備</label>
    <select id="model">
      <option>S23 Ultra 黑</option>
    </select>

    <div class="checkbox-group">
      <input type="checkbox" id="charger" />
      <label for="charger">需要 Type-C 充電頭</label>
    </div>

    <label for="contact">IG 或 LINE ID</label>
    <input type="text" id="contact" required />

    <label for="pickup">預計取機地點</label>
    <select id="pickup" required>
      <option>弘大</option>
      <option>新村</option>
      <option>合井</option>
      <option>望遠</option>
      <option>永登浦周邊</option>
    </select>

    <label for="note">備註</label>
    <textarea id="note"></textarea>

    <div class="checkbox-group">
      <input type="checkbox" id="agree" required />
      <label for="agree">我已閱讀並同意租借規則</label>
    </div>

    <button type="submit">送出預約</button>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script>
    async function fetchReservedDates() {
      const res = await fetch("https://script.google.com/macros/s/AKfycbxNBeTng-gU9frn-zMDXJUVfnytCalCSk1W7xLZXzJ63dmtH6A2gN7b9m1HrinPrd1q/exec");
      const data = await res.json();

      const disabled = [];
      data.forEach(range => {
        const start = new Date(range.start);
        const end = new Date(range.end);
        while (start <= end) {
          disabled.push(start.toISOString().split("T")[0]);
          start.setDate(start.getDate() + 1);
        }
      });

      const fp = flatpickr("#daterange", {
        mode: "range",
        minDate: "today",
        dateFormat: "Y-m-d",
        disable: disabled,
        onChange: function(selectedDates) {
          const summary = document.getElementById("summary");
          if (selectedDates.length === 2) {
            const start = selectedDates[0].toLocaleDateString();
            const end = selectedDates[1].toLocaleDateString();
            summary.innerHTML = `
              📦 領取日：<strong>${start}</strong><br>
              📦 還機日：<strong>${end}</strong>
            `;
            summary.style.display = "block";
          } else {
            summary.style.display = "none";
          }
        }
      });

      document.getElementById("rental-form").addEventListener("submit", async function(e) {
        e.preventDefault();
        const form = e.target;
        const [start, end] = document.getElementById("daterange")._flatpickr.selectedDates;
        const payload = {
          name: form.name.value,
          phone: form.phone.value,
          startDate: start.toISOString().split("T")[0],
          endDate: end.toISOString().split("T")[0],
          days: form.days.value,
          model: form.model.value,
          charger: form.charger.checked ? "需要" : "不需要",
          contact: form.contact.value,
          pickup: form.pickup.value,
          note: form.note.value,
          timestamp: new Date().toISOString(),
        };

        await fetch("https://script.google.com/macros/s/【替換成你的API】/exec", {
          method: "POST",
          body: JSON.stringify(payload),
        });

        alert("預約成功！");
        form.reset();
        summary.style.display = "none";
        fp.clear();
      });
    }

    fetchReservedDates();
  </script>
</body>
</html>

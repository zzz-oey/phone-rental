<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>手機租借預約表單</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 引入 flatpickr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

  <style>
    body {
      font-family: "Helvetica Neue", sans-serif;
      padding: 30px;
      max-width: 600px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 20px 0 6px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      margin: 16px 0;
    }

    .checkbox-group input {
      margin-right: 10px;
      transform: scale(1.2);
    }

    button {
      background-color: #222;
      color: #fff;
      padding: 12px;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      width: 100%;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background-color: #444;
    }

    .note {
      font-size: 14px;
      color: #666;
      margin-top: -10px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>手機租借預約表單</h1>
  <form id="rentalForm">
    <label for="name">姓名</label>
    <input type="text" id="name" name="name" required />

    <label for="phone">聯絡電話</label>
    <input type="tel" id="phone" name="phone" required />

    <label for="startDate">租借起始日</label>
    <input type="text" id="startDate" name="startDate" required readonly />

    <label for="days">租借天數</label>
    <select id="days" name="days" required>
      <option value="">請選擇</option>
      <option value="1">1 天</option>
      <option value="2">2 天</option>
      <option value="3">3 天</option>
      <option value="4">4 天</option>
      <option value="5">5 天以上</option>
    </select>

    <label for="model">租借設備</label>
    <select id="model" name="model">
      <option>S23 Ultra 墨竹綠</option>
    </select>

    <div class="checkbox-group">
      <input type="checkbox" id="charger" name="charger" />
      <label for="charger">是否需要 Type-C 充電頭</label>
    </div>

    <label for="contact">IG帳號 或 LINE ID</label>
    <input type="text" id="contact" name="contact" placeholder="@your_ig 或 line_id" required />

    <label for="pickup">預計取機地點</label>
    <select id="pickup" name="pickup" required>
      <option>弘大</option>
      <option>新村</option>
      <option>合井</option>
      <option>望遠</option>
      <option>永登浦周邊</option>
    </select>

    <label for="note">備註</label>
    <textarea id="note" name="note" placeholder="如有特殊需求請備註"></textarea>

    <div class="checkbox-group">
      <input type="checkbox" id="agree" name="agree" required />
      <label for="agree">我已閱讀並同意租借規則</label>
    </div>

    <button type="submit">送出預約</button>
  </form>

  <script>
    // 替換成你自己的 Apps Script 網址
    const API_URL = 'https://script.google.com/macros/s/AKfycbzG5uBclXUVjO2QeBw-tWchrd34fJIzNrnd8IdvcQSayuVOCXnzkbe6edfH_DRAAxBl/exec';

    // 初始已被預約的日期
    let reservedDates = [];

    // 載入時從 API 讀取已預約日
    async function fetchReservedDates() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();
        reservedDates = data.map(row => row.startDate);
        initDatePicker();
      } catch (err) {
        alert('無法讀取已預約日，請稍後再試');
        console.error(err);
      }
    }

    // 初始化日期選擇器，disable 已預約日
    function initDatePicker() {
      flatpickr("#startDate", {
        dateFormat: "Y-m-d",
        disable: reservedDates,
        minDate: "today"
      });
    }

    // 表單送出
    document.getElementById("rentalForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const formData = new FormData(this);
      const data = Object.fromEntries(formData.entries());

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          mode: "no-cors", // 如果你有設 Apps Script CORS，可以改為 'cors'
          body: new URLSearchParams(data),
        });

        alert("✅ 預約已送出！");
        this.reset();
      } catch (err) {
        alert("❌ 預約失敗，請稍後再試");
        console.error(err);
      }
    });

    // 開始載入預約日
    fetchReservedDates();
  </script>
</body>
</html>
